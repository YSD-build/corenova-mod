name: CoreNova CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'        # ← 改为 8.10.2（满足 loom 要求）
          arguments: build
      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: corenova-mod
          path: build/libs/*.jar